<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Group Chat</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
    .chat-container { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #chat-log { border: 1px solid #e2e8f0; height: 350px; overflow-y: scroll; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; background: #fafafa; }
    .message { margin: 0.5rem 0; padding: 0.5rem; border-radius: 6px; background: #f1f5f9; }
    .input-area { display: flex; gap: 0.5rem; }
    input { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
    #username { width: 110px; }
    #msg-input { flex: 1; }
    button { padding: 0.75rem 1.5rem; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="chat-container">
    <h2>💬 Our Squad Chat</h2>
    <div id="chat-log"></div>
    <div class="input-area">
      <input type="text" id="username" placeholder="Name">
      <input type="text" id="msg-input" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // ⚠️ Keep your exact Cloudflare Worker URL here!
    const WORKER_URL = "wss://edge-chat-demo.adrianrobertai.workers.dev/api/room/squad-room/websocket";

    console.log("[DEBUG] Attempting to connect to:", WORKER_URL);
    const ws = new WebSocket(WORKER_URL);
    const log = document.getElementById("chat-log");

    function addSystemMessage(text) {
      const div = document.createElement("div");
      div.className = "message";
      div.style.backgroundColor = "#e2e8f0";
      div.style.color = "#475569";
      div.style.fontStyle = "italic";
      div.innerHTML = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    // Connection successfully opened
    ws.onopen = (event) => {
      console.log("[DEBUG] 🟢 WebSocket connection opened!", event);
      addSystemMessage("🟢 Connected to server! Type a message to join the room.");
    };

    // Connection closed
    ws.onclose = (event) => {
      console.warn("[DEBUG] 🔴 WebSocket connection closed.", event);
      addSystemMessage(`🔴 Disconnected from server (Code: ${event.code}).`);
    };

    // Connection error
    ws.onerror = (error) => {
      console.error("[DEBUG] ⚠️ WebSocket encountered an error:", error);
    };

    // Listen for incoming messages & system events
    ws.onmessage = (event) => {
      console.log("[DEBUG] 📩 Raw data received:", event.data);
      try {
        const data = JSON.parse(event.data);
        console.log("[DEBUG] 📩 Parsed JSON:", data);

        // 1. Handle someone joining the room
        if (data.joined) {
          addSystemMessage(`👋 <strong>${data.joined}</strong> joined the chat!`);
        }
        // 2. Handle someone leaving the room
        else if (data.quit || data.left) {
          const leaver = data.quit || data.left;
          addSystemMessage(`🏃 <strong>${leaver}</strong> left the chat.`);
        }
        // 3. Handle room ready confirmation
        else if (data.ready) {
          console.log("[DEBUG] ⚡ Room session ready!");
        }
        // 4. Handle standard chat messages
        else if (data.message || data.text || data.content) {
          const sender = data.name || data.from || "Anonymous";
          const msgText = data.message || data.text || data.content;

          const div = document.createElement("div");
          div.className = "message";
          div.innerHTML = `<strong>${sender}:</strong> ${msgText}`;
          log.appendChild(div);
          log.scrollTop = log.scrollHeight;
        } else {
          console.log("[DEBUG] Unhandled JSON format from server:", data);
        }
      } catch (e) {
        // Handle plain text messages if the server sends non-JSON strings
        const div = document.createElement("div");
        div.className = "message";
        div.innerText = event.data;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      }
    };

    // Send your message
    function sendMessage() {
      const name = document.getElementById("username").value || "Anonymous";
      const input = document.getElementById("msg-input");
      const text = input.value.trim();

      if (text === "") return;

      if (ws.readyState !== WebSocket.OPEN) {
        alert("Cannot send message: Not connected to the chat server.");
        return;
      }

      const payload = JSON.stringify({ name: name, message: text });
      console.log("[DEBUG] 🚀 Sending payload:", payload);

      try {
        ws.send(payload);
        input.value = "";
      } catch (err) {
        console.error("[DEBUG] ❌ Error sending message:", err);
      }
    }

    // Allow pressing "Enter" to send
    document.getElementById("msg-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
