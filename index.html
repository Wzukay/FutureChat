<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Group Chat</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
    .chat-container { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #chat-log { border: 1px solid #e2e8f0; height: 350px; overflow-y: scroll; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; background: #fafafa; }
    .message { margin: 0.5rem 0; padding: 0.5rem; border-radius: 6px; background: #f1f5f9; }
    .input-area { display: flex; gap: 0.5rem; }
    input { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
    #username { width: 110px; }
    #msg-input { flex: 1; }
    button { padding: 0.75rem 1.5rem; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="chat-container">
    <h2>💬 Our Squad Chat</h2>
    <div id="chat-log"></div>
    <div class="input-area">
      <input type="text" id="username" placeholder="Name">
      <input type="text" id="msg-input" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // ⚠️ IMPORTANT: Replace below with your Cloudflare URL. 
    // Change "https://" to "wss://" and keep the /api/room/... path!
    const WORKER_URL = "wss://edge-chat-demo.adrianrobertai.workers.dev/api/room/squad-room/websocket";
    
    console.log("[DEBUG] Attempting to connect to:", WORKER_URL);
      const ws = new WebSocket(WORKER_URL);
      const log = document.getElementById("chat-log");

      // Debug: Connection successfully opened
      ws.onopen = (event) => {
        console.log("[DEBUG] 🟢 WebSocket connection successfully opened!", event);
        const systemMsg = document.createElement("div");
        systemMsg.className = "message";
        systemMsg.innerHTML = "<em>🟢 Connected to server! You can start chatting.</em>";
        log.appendChild(systemMsg);
      };

      // Debug: Connection closed
      ws.onclose = (event) => {
        console.warn("[DEBUG] 🔴 WebSocket connection closed.", event);
        const systemMsg = document.createElement("div");
        systemMsg.className = "message";
        systemMsg.innerHTML = `<em>🔴 Disconnected from server (Code: ${event.code}).</em>`;
        log.appendChild(systemMsg);
      };

      // Debug: Connection error
      ws.onerror = (error) => {
        console.error("[DEBUG] ⚠️ WebSocket encountered an error:", error);
      };

      // Listen for incoming messages
      ws.onmessage = (event) => {
        console.log("[DEBUG] 📩 Raw data received from server:", event.data);
        try {
          const data = JSON.parse(event.data);
          console.log("[DEBUG] 📩 Parsed JSON data:", data);

          if (data.name && data.message) {
            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `<strong>${data.name}:</strong> ${data.message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
          } else {
            console.warn("[DEBUG] Received JSON, but missing 'name' or 'message' fields:", data);
          }
        } catch (e) {
          console.warn("[DEBUG] Received non-JSON message from server:", event.data);
        }
      };

      // Send your message
      function sendMessage() {
        const name = document.getElementById("username").value || "Anonymous";
        const input = document.getElementById("msg-input");
        const text = input.value.trim();

        console.log(`[DEBUG] 'Send' clicked. Name: "${name}", Message: "${text}"`);

        if (text === "") {
          console.log("[DEBUG] Message input is empty, ignoring send request.");
          return;
        }

        // Check if WebSocket is actually connected before sending
        if (ws.readyState !== WebSocket.OPEN) {
          console.error(`[DEBUG] ❌ Cannot send message! WebSocket state is ${ws.readyState} (OPEN is ${WebSocket.OPEN}).`);
          alert("Cannot send message: Not connected to the chat server. Check your console (F12) for details.");
          return;
        }

        const payload = JSON.stringify({ name: name, message: text });
        console.log("[DEBUG] 🚀 Sending payload to server:", payload);

        try {
          ws.send(payload);
          input.value = ""; // Only clear input if send didn't crash
          console.log("[DEBUG] ✅ Payload sent successfully.");
        } catch (err) {
          console.error("[DEBUG] ❌ Error while calling ws.send():", err);
        }
      }

      // Allow pressing "Enter" to send
      document.getElementById("msg-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
</body>
</html>
